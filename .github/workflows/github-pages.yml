# Build Astro as static HTML and deploy to GitHub Pages.
# Disable/remove any workflow that uses actions/jekyll-build-pages — Jekyll cannot build this repo.
name: Deploy Astro site to Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install and build
        env:
          GITHUB_PAGES: 'true'
          # Must match the repo segment in https://<user>.github.io/<repo>/ (this repo is phamou/Portfolio)
          GITHUB_PAGES_BASE: '/Portfolio'
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
